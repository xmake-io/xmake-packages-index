name: Azure Static Web Apps CI/CD

on:
  schedule:
    # Hourly refresh: re-run the lua indexer against the latest xmake-repo
    # snapshot and redeploy. GitHub may delay scheduled runs slightly.
    - cron: '0 * * * *'
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: azure-swa
  cancel-in-progress: false

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      # Same pattern as xmake-docs: let Azure's Oryx container build the site
      # by pointing app_build_command at our local script. build.sh itself
      # bootstraps xmake on first run, since Oryx doesn't have it preinstalled.
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KIND_BAY_069173110 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "/"                       # source root
          api_location: ""
          app_build_command: "./build.sh"         # Oryx runs this
          output_location: "web/dist"             # relative to app_location
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KIND_BAY_069173110 }}
          action: "close"
