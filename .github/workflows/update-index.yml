name: Update index & deploy site

on:
  schedule:
    # Hourly at minute 0. GitHub may delay scheduled runs under load.
    - cron: '0 * * * *'
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm install --no-audit --no-fund

      - name: Build dataset + static site
        env:
          # gh-pages serves at https://<user>.github.io/<repo>/ unless a CNAME
          # is present. The CI default is the project sub-path; override at the
          # repo level by setting VITE_BASE in repo Variables (e.g. "/").
          VITE_BASE: ${{ vars.VITE_BASE || '/xmake-packages-index/' }}
        run: ./build.sh

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
