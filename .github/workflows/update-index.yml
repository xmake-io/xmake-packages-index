name: Update index & deploy site

on:
  schedule:
    # Hourly at minute 0. GitHub may delay scheduled runs under load.
    - cron: '0 * * * *'
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      # build.sh auto-installs xmake when missing; node, npm, git, curl,
      # python3 are all preinstalled on ubuntu-latest. Caching npm + the
      # xmake-repo checkout makes hourly reruns finish in well under a minute.
      - name: Cache npm + xmake-repo checkout
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            .cache/xmake-repo
          key: ${{ runner.os }}-pkgs-index-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pkgs-index-

      - name: Build dataset + static site
        env:
          # gh-pages serves at https://<user>.github.io/<repo>/ unless a CNAME
          # is present. The default below targets the project sub-path; override
          # at the repo level by setting VITE_BASE in Variables (e.g. "/").
          VITE_BASE: ${{ vars.VITE_BASE || '/xmake-packages-index/' }}
        run: ./build.sh

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
