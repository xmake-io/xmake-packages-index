name: Azure Static Web Apps CI/CD

on:
  schedule:
    # Hourly refresh: re-run the lua indexer against the latest xmake-repo
    # snapshot and redeploy. GitHub may delay scheduled runs slightly.
    - cron: '0 * * * *'
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: azure-swa
  cancel-in-progress: false

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      # The build depends on xmake (for the lua indexer); Azure's built-in
      # Oryx builder doesn't know about xmake, so we run the whole build on
      # the GitHub runner and ship the finished artifact to SWA with
      # skip_app_build: true.
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Cache npm + xmake-repo checkout
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            .cache/xmake-repo
          key: ${{ runner.os }}-pkgs-index-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pkgs-index-

      - name: Build dataset + static site
        env:
          # SWA serves from the root of the resource hostname; "/" is correct.
          VITE_BASE: ${{ vars.VITE_BASE || '/' }}
        run: ./build.sh

      - name: Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_MUSHROOM_0846C5D10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "web/dist"   # already-built static artifact
          api_location: ""
          output_location: ""
          skip_app_build: true
          skip_api_build: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_MUSHROOM_0846C5D10 }}
          action: "close"
